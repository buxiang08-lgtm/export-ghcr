name: Export GHCR Image to TAR

on:
  workflow_dispatch:
    inputs:
      image:
        description: '完整镜像地址'
        required: true
        default: 'ghcr.io/cirruslabs/android-sdk:35'
      filename:
        description: '导出的文件名（不含 .tar）'
        required: true
        default: 'android-sdk-35'

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取镜像
        run: docker pull ${{ github.event.inputs.image }}

      - name: 导出为 TAR 文件
        run: |
          docker save ${{ github.event.inputs.image }} \
            -o ${{ github.event.inputs.filename }}.tar

      - name: 查看文件大小
        run: ls -lh ${{ github.event.inputs.filename }}.tar

      - name: 创建 Release 并上传
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.filename }}
          name: ${{ github.event.inputs.filename }}
          body: |
            自动导出的 Docker 镜像文件
            - 镜像：`${{ github.event.inputs.image }}`
            - 导出时间：${{ github.run_id }}
          files: ${{ github.event.inputs.filename }}.tar
