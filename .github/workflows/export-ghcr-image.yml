name: Export GHCR Image to TAR

on:
  workflow_dispatch:
    inputs:
      image:
        description: '完整镜像地址'
        required: true
        default: 'ghcr.io/cirruslabs/android-sdk:35'
      filename:
        description: '导出的文件名（不含 .tar）'
        required: true
        default: 'android-sdk-35-arm64'
      platform:
        description: '目标架构'
        required: true
        default: 'linux/arm64'
        type: choice
        options:
          - linux/arm64
          - linux/amd64

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: 配置 QEMU（支持跨架构拉取）
        uses: docker/setup-qemu-action@v3

      - name: 配置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 拉取指定架构镜像
        run: |
          docker pull --platform ${{ github.event.inputs.platform }} \
            ${{ github.event.inputs.image }}

      - name: 导出为 TAR 文件
        run: |
          docker save ${{ github.event.inputs.image }} \
            -o ${{ github.event.inputs.filename }}.tar

      - name: 查看文件大小
        run: ls -lh ${{ github.event.inputs.filename }}.tar

      - name: 上传到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.filename }}
          path: ${{ github.event.inputs.filename }}.tar
          retention-days: 3
